<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - MarketLens</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#0a0f18; --card:#131f31; --border:#22344e; --accent:#18c8ff; --text:#dce8f5; --muted:#8da3bb; --danger:#ff5d73; }
    * { box-sizing:border-box; margin:0; padding:0; } body { font-family:Inter,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:grid; place-items:center; padding:1rem; }
    .card { width:min(100%,420px); background:var(--card); border:1px solid var(--border); border-radius:14px; padding:1.4rem; }
    h1 { font-size:1.4rem; margin-bottom:.4rem; } p { color:var(--muted); margin-bottom:1rem; font-size:.92rem; }
    label { display:block; font-size:.8rem; color:var(--muted); margin-bottom:.4rem; font-family:"Space Mono",monospace; text-transform:uppercase; }
    input { width:100%; margin-bottom:.9rem; background:#0f1727; border:1px solid var(--border); color:var(--text); border-radius:8px; padding:.72rem .8rem; }
    input:focus { outline:none; border-color:var(--accent); }
    button { width:100%; border:none; border-radius:8px; background:var(--accent); color:#062231; font-weight:700; padding:.76rem; cursor:pointer; }
    .err { background:rgba(255,93,115,.12); border:1px solid rgba(255,93,115,.45); color:var(--danger); border-radius:8px; padding:.6rem .7rem; font-size:.84rem; margin-bottom:.8rem; }
    .row { margin-top:.9rem; display:flex; justify-content:space-between; flex-wrap:wrap; gap:.6rem; font-size:.85rem; }
    a { color:var(--accent); text-decoration:none; }
  </style>
  {% if user %}<link rel="stylesheet" href="/static/css/chatbot.css" />{% endif %}
</head>
<body>
  <form class="card" method="POST">
    <h1>Sign in to MarketLens</h1>
    <p>Access your personal dashboard and watchlist.</p>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <label>Username</label>
    <input name="username" required />
    <label>Password</label>
    <input name="password" type="password" required />
    <button type="submit">Login</button>
    <div class="row"><a href="/register">Create account</a><a href="/home">Back to Home</a></div>
  </form>
  {% if user %}<script src="/static/js/chatbot.js" data-page="login" data-enabled="true"></script>{% endif %}
</body>
</html>
